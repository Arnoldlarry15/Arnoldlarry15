<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0d0a22"/>
    <stop offset="100%" stop-color="#000008"/>
  </radialGradient>
  <radialGradient id="galaxyGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#c8a0ff" stop-opacity="0.0"/>
    <stop offset="30%" stop-color="#8855cc" stop-opacity="0.25"/>
    <stop offset="60%" stop-color="#ff8800" stop-opacity="0.18"/>
    <stop offset="80%" stop-color="#4433aa" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#000008" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#ffffff"/>
    <stop offset="15%" stop-color="#e0ccff"/>
    <stop offset="35%" stop-color="#9966ff" stop-opacity="0.9"/>
    <stop offset="55%" stop-color="#ff8800" stop-opacity="0.5"/>
    <stop offset="80%" stop-color="#330055" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bigglow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="18"/>
  </filter>
  <filter id="diskblur" x="-30%" y="-100%" width="160%" height="300%">
    <feGaussianBlur stdDeviation="7"/>
  </filter>
  <filter id="diskblur2" x="-30%" y="-100%" width="160%" height="300%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <style>
    @keyframes tw  { 0%,100%{opacity:.15} 50%{opacity:.9} }
    @keyframes pls { 0%,100%{opacity:.75} 50%{opacity:1}  }
    @keyframes rot { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .d1{transform-origin:600px 370px;animation:rot  7s linear infinite}
    .d2{transform-origin:600px 370px;animation:rot 14s linear infinite}
    .d3{transform-origin:600px 370px;animation:rot 26s linear infinite}
    .d4{transform-origin:600px 370px;animation:rot 48s linear infinite}
    .pls{animation:pls 3.5s ease-in-out infinite}
    .lbl {font:bold 9px 'Courier New',monospace;fill:#ddd;letter-spacing:1.5px}
    .lbl2{font:bold 7px 'Courier New',monospace;fill:#bbb;letter-spacing:1px}
  </style>
</defs>
<rect width="1200" height="700" fill="url(#bg)"/>
<ellipse cx="600" cy="370" rx="480" ry="160" fill="none" stroke="#6644aa" stroke-width="80" stroke-opacity=".07" filter="url(#softblur)"/>
<ellipse cx="600" cy="370" rx="360" ry="120" fill="none" stroke="#9966cc" stroke-width="60" stroke-opacity=".08" filter="url(#softblur)"/>
<ellipse cx="600" cy="370" rx="240" ry="80"  fill="none" stroke="#cc8833" stroke-width="50" stroke-opacity=".1"  filter="url(#softblur)"/>
<circle cx="600" cy="370" r="300" fill="url(#galaxyGlow)" filter="url(#softblur)"/>
<g class="d4" filter="url(#diskblur2)" opacity=".5">
  <ellipse cx="600" cy="370" rx="220" ry="38" fill="none" stroke="#ff6600" stroke-width="28"/>
  <ellipse cx="600" cy="370" rx="185" ry="30" fill="none" stroke="#ffaa00" stroke-width="20"/>
</g>
<g class="d3" filter="url(#diskblur)" opacity=".7">
  <ellipse cx="600" cy="370" rx="165" ry="26" fill="none" stroke="#ff8800" stroke-width="14"/>
  <ellipse cx="600" cy="370" rx="140" ry="21" fill="none" stroke="#ffcc44" stroke-width="9"/>
  <ellipse cx="600" cy="370" rx="118" ry="17" fill="none" stroke="#ffe899" stroke-width="6"/>
</g>
<g class="d2" opacity=".88">
  <ellipse cx="600" cy="370" rx="100" ry="14" fill="none" stroke="#ffffff" stroke-width="3.5"/>
  <ellipse cx="600" cy="370" rx="88"  ry="12" fill="none" stroke="#ffe8cc" stroke-width="5.5"/>
  <ellipse cx="600" cy="370" rx="76"  ry="10" fill="none" stroke="#ffaa44" stroke-width="7"/>
</g>
<g class="d1" opacity=".95">
  <ellipse cx="600" cy="370" rx="64"  ry="8"  fill="none" stroke="#ffffff" stroke-width="2.5"/>
</g>
<circle cx="600" cy="370" r="120" fill="url(#coreGrad)" filter="url(#bigglow)" class="pls"/>
<circle cx="600" cy="370" r="48"  fill="none" stroke="#aa88ff" stroke-width="1.5" opacity=".6"/>
<circle cx="600" cy="370" r="40"  fill="#000000"/>
<text x="600" y="363" text-anchor="middle" font-family="'Courier New',monospace" font-weight="900" font-size="18" fill="#ffffff" letter-spacing="4">LA</text>
<text x="600" y="380" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="9"  fill="#c8b8ff" letter-spacing="6">BUILDS</text>
<ellipse id="rARES"   fill="none" stroke="#ffcc44" stroke-width=".8" stroke-opacity=".7" stroke-dasharray="2,3"/>
<ellipse id="rRedSet" fill="none" stroke="#ff5566" stroke-width=".8" stroke-opacity=".7" stroke-dasharray="2,3"/>
<ellipse id="rAICP"   fill="none" stroke="#44dd88" stroke-width=".8" stroke-opacity=".7" stroke-dasharray="2,3"/>
<g id="pSentinel" filter="url(#glow)"><circle r="18" fill="#1535aa"/><circle r="18" fill="none" stroke="#5599ff" stroke-width="1.8"/><circle r="18" fill="#1535aa" opacity=".3"/><path d="M0,-9 L-7,-5 L-7,3.5 Q-7,9 0,12 Q7,9 7,3.5 L7,-5Z" fill="none" stroke="#88bbff" stroke-width="1.4"/><path d="M-3,1 L-1,4 L4,-3" fill="none" stroke="#fff" stroke-width="1.6"/></g>
<g id="lSentinel"><text class="lbl" text-anchor="middle" dy="32">SENTINEL</text><text class="lbl" text-anchor="middle" dy="43" opacity=".7">PROTOCOL</text></g>
<g id="pARES" filter="url(#glow)"><circle r="10" fill="#7a3800"/><circle r="10" fill="none" stroke="#ffaa33" stroke-width="1.2"/><circle r="5"  fill="none" stroke="#ffcc66" stroke-width="1"/><circle r="2"  fill="none" stroke="#ffcc66" stroke-width=".7"/><line x1="0" y1="-7" x2="0" y2="-5.5" stroke="#ffcc66" stroke-width=".9"/><line x1="0" y1="5.5" x2="0" y2="7"   stroke="#ffcc66" stroke-width=".9"/><line x1="-7" y1="0" x2="-5.5" y2="0" stroke="#ffcc66" stroke-width=".9"/><line x1="5.5" y1="0" x2="7" y2="0"   stroke="#ffcc66" stroke-width=".9"/></g>
<g id="lARES"><text class="lbl2" text-anchor="middle" dy="20">ARES</text></g>
<g id="pRedSet" filter="url(#glow)"><circle r="9" fill="#7a0015"/><circle r="9" fill="none" stroke="#ff4455" stroke-width="1.2"/><path d="M-3,-5 Q0,-1 3,5"  fill="none" stroke="#ff7777" stroke-width="1.1"/><path d="M3,-5  Q0,-1 -3,5" fill="none" stroke="#ff7777" stroke-width="1.1"/><line x1="-4.5" y1="-6" x2="4.5" y2="-6" stroke="#ff4444" stroke-width=".9"/><line x1="-4.5" y1="6"  x2="4.5" y2="6"  stroke="#ff4444" stroke-width=".9"/></g>
<g id="lRedSet"><text class="lbl2" text-anchor="middle" dy="19">RED SET</text><text class="lbl2" text-anchor="middle" dy="29" opacity=".7">PROTOCELL</text></g>
<g id="pAICP" filter="url(#glow)"><circle r="8" fill="#0a3322"/><circle r="8" fill="none" stroke="#33cc77" stroke-width="1.2"/><circle cx="-2.2" r="2.5" fill="none" stroke="#55ffaa" stroke-width=".9"/><circle cx="2.2"  r="2.5" fill="none" stroke="#55ffaa" stroke-width=".9"/><line x1="-5" y1="-2" x2="-5" y2="2" stroke="#33cc77" stroke-width=".9"/><line x1="5"  y1="-2" x2="5"  y2="2" stroke="#33cc77" stroke-width=".9"/></g>
<g id="lAICP"><text class="lbl2" text-anchor="middle" dy="17">AI CONTROL</text><text class="lbl2" text-anchor="middle" dy="27" opacity=".7">PLANE</text></g>
<g id="pCaptureFlow" filter="url(#glow)"><circle r="16" fill="#3a1080"/><circle r="16" fill="none" stroke="#9966ff" stroke-width="1.8"/><circle r="7"  fill="none" stroke="#cc99ff" stroke-width="1.3"/><circle r="2.5" fill="#cc99ff"/><line x1="-7" y1="0" x2="-10" y2="0"   stroke="#cc99ff" stroke-width="1.1"/><line x1="7"  y1="0" x2="10"  y2="0"   stroke="#cc99ff" stroke-width="1.1"/><line x1="0" y1="-7" x2="0"   y2="-10" stroke="#cc99ff" stroke-width="1.1"/><line x1="-5" y1="-5" x2="-7.5" y2="-7.5" stroke="#cc99ff" stroke-width=".8"/></g>
<g id="lCaptureFlow"><text class="lbl" text-anchor="middle" dy="28">CAPTUREFLOW</text></g>
<g id="pRSEA" filter="url(#glow)"><circle r="15" fill="#0c5030"/><circle r="15" fill="none" stroke="#33ff88" stroke-width="1.8"/><rect x="-6" y="-7" width="12" height="9" rx="2" fill="none" stroke="#55ffaa" stroke-width="1.1"/><circle cx="-2.5" cy="-3" r="1.5" fill="#aaffcc"/><circle cx="2.5"  cy="-3" r="1.5" fill="#aaffcc"/><line x1="-2.5" y1="1.5" x2="2.5" y2="1.5" stroke="#55ffaa" stroke-width="1"/><line x1="-3"   y1="-7"  x2="-3"  y2="-10" stroke="#33ff88" stroke-width="1.2"/><line x1="3"    y1="-7"  x2="3"   y2="-10" stroke="#33ff88" stroke-width="1.2"/></g>
<g id="lRSEA"><text class="lbl" text-anchor="middle" dy="27">RSEA AGENT</text></g>
<g id="pResearch" filter="url(#glow)"><circle r="14" fill="#082060"/><circle r="14" fill="none" stroke="#4488ff" stroke-width="1.8"/><circle cx="1.5" cy="-1" r="6" fill="none" stroke="#88bbff" stroke-width="1.3"/><line x1="-3" y1="4" x2="-7.5" y2="8.5" stroke="#88bbff" stroke-width="2" stroke-linecap="round"/></g>
<g id="lResearch"><text class="lbl" text-anchor="middle" dy="26">RESEARCH</text></g>
<g id="pFuture" filter="url(#glow)"><circle r="15" fill="#6a3500"/><circle r="15" fill="none" stroke="#ffaa33" stroke-width="1.8"/><path d="M0,-9 C-3.5,-9 -5,-4 -5,2.5 L0,6 L5,2.5 C5,-4 3.5,-9 0,-9Z" fill="none" stroke="#ffdd88" stroke-width="1.2"/><circle cy="-4" r="2" fill="#ffeeaa"/><path d="M-5,2.5 L-8,8 L-2,5Z" fill="#ff8800"/><path d="M5,2.5  L8,8  L2,5Z"  fill="#ff8800"/></g>
<g id="lFuture"><text class="lbl" text-anchor="middle" dy="27">FUTURE</text><text class="lbl" text-anchor="middle" dy="38" opacity=".7">PROJECTS</text></g>
<g id="pMaryville" filter="url(#glow)"><circle r="16" fill="#6a0f2a"/><circle r="16" fill="none" stroke="#ff55aa" stroke-width="1.8"/><path d="M0,-10 L-7.5,-6 L-7.5,4.5 Q-7.5,10 0,14 Q7.5,10 7.5,4.5 L7.5,-6Z" fill="none" stroke="#ff88cc" stroke-width="1.2"/><text text-anchor="middle" font-family="'Courier New',monospace" font-size="9" font-weight="900" fill="#ffccdd" dy="3.5">M</text></g>
<g id="lMaryville"><text class="lbl" text-anchor="middle" dy="29">MARYVILLE</text><text class="lbl" text-anchor="middle" dy="40" opacity=".7">CS &amp; AI</text></g>
<script><![CDATA[
(function(){
  var CX=600, CY=370, TAU=Math.PI*2, VS = 0.33;
  function P(r){ return 20*Math.pow(r/145,1.5); }
  var main=[
    {p:'pSentinel',    l:'lSentinel',    rx:145, ph:TAU*0.75},
    {p:'pCaptureFlow', l:'lCaptureFlow', rx:195, ph:TAU*0.08},
    {p:'pResearch',    l:'lResearch',    rx:248, ph:TAU*0.60},
    {p:'pRSEA',        l:'lRSEA',        rx:302, ph:TAU*0.28},
    {p:'pFuture',      l:'lFuture',      rx:360, ph:TAU*0.45},
    {p:'pMaryville',   l:'lMaryville',   rx:420, ph:TAU*0.15},
  ];
  var moons=[
    {p:'pARES',   l:'lARES',   ring:'rARES',   rx:38, ph:0},
    {p:'pRedSet', l:'lRedSet', ring:'rRedSet', rx:50, ph:TAU*0.33},
    {p:'pAICP',   l:'lAICP',  ring:'rAICP',   rx:32, ph:TAU*0.67},
  ];
  function g(id){ return document.getElementById(id); }
  function mv(id,x,y){
    var e=g(id);
    if(e) e.setAttribute('transform','translate('+x.toFixed(2)+','+y.toFixed(2)+')');
  }
  var t0=null;
  function frame(ts){
    if(!t0) t0=ts;
    var t=(ts-t0)/1000, sx=CX, sy=CY;
    for(var i=0;i<main.length;i++){
      var o=main[i], a=o.ph + TAU*t/P(o.rx);
      var x=CX + o.rx*Math.cos(a), y=CY + o.rx*VS*Math.sin(a);
      mv(o.p,x,y); mv(o.l,x,y);
      if(o.p==='pSentinel'){ sx=x; sy=y; }
    }
    for(var j=0;j<moons.length;j++){
      var m=moons[j], a=m.ph + TAU*t/(P(m.rx)*0.38);
      var mx=sx + m.rx*Math.cos(a), my=sy + m.rx*VS*Math.sin(a);
      mv(m.p,mx,my); mv(m.l,mx,my);
      var r=g(m.ring);
      if(r){ r.setAttribute('cx', sx.toFixed(2)); r.setAttribute('cy', sy.toFixed(2)); r.setAttribute('rx', m.rx); r.setAttribute('ry', (m.rx*VS).toFixed(2)); }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
]]></script>
</svg>
                
