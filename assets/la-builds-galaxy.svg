<svg width="100%" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0b1026"/>
      <stop offset="50%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#02030a"/>
    </radialGradient>

    <!-- Core glow -->
    <radialGradient id="coreGlow">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#9b7bff"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Sentinel glow -->
    <radialGradient id="sentinelGlow">
      <stop offset="0%" stop-color="#fff7b0"/>
      <stop offset="40%" stop-color="#ffcc55"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- CaptureFlow glow -->
    <radialGradient id="blueGlow">
      <stop offset="0%" stop-color="#7ad7ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- RSEA glow -->
    <radialGradient id="purpleGlow">
      <stop offset="0%" stop-color="#d18bff"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

  </defs>

  <!-- SPACE -->
  <rect width="1000" height="650" fill="url(#spaceBg)"/>

  <!-- STAR FIELD -->
  <g fill="white" opacity="0.6">
    <circle cx="120" cy="90" r="1"/>
    <circle cx="260" cy="180" r="1.2"/>
    <circle cx="820" cy="140" r="1"/>
    <circle cx="640" cy="520" r="1"/>
    <circle cx="920" cy="300" r="0.8"/>
    <circle cx="300" cy="480" r="1.1"/>
  </g>

  <!-- ===================== -->
  <!-- SENTINEL SYSTEM CORE  -->
  <!-- ===================== -->

  <g transform="translate(520 170)">

    <!-- Orbit ring -->
    <ellipse cx="0" cy="120" rx="170" ry="70"
      fill="none" stroke="white" opacity="0.08"/>

    <!-- Sentinel star (large primary) -->
    <circle cx="0" cy="0" r="42" fill="url(#sentinelGlow)" filter="url(#blur)">
      <animate attributeName="r" values="40;46;40" dur="6s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="-60" text-anchor="middle" fill="white" font-size="14" font-family="monospace">
      SENTINEL PROTOCOL
    </text>

    <!-- PLANETS ORBITING SENTINEL -->

    <!-- ProtoCell -->
    <g>
      <circle r="10" fill="#ff6b6b">
        <animateMotion dur="14s" repeatCount="indefinite"
          path="M -170 120 A 170 70 0 1 1 170 120 A 170 70 0 1 1 -170 120"/>
      </circle>
      <text fill="white" font-size="10" font-family="monospace">
        <textPath href="#protoLabelPath">ProtoCell</textPath>
      </text>
    </g>

    <!-- ARES Dashboard -->
    <g>
      <circle r="10" fill="#4aa3ff">
        <animateMotion dur="18s" repeatCount="indefinite"
          path="M -170 120 A 170 70 0 1 1 170 120 A 170 70 0 1 1 -170 120"/>
      </circle>
      <text x="20" y="160" fill="white" font-size="10" font-family="monospace">
        ARES Dashboard
      </text>
    </g>

    <!-- AI Control Plane -->
    <g>
      <circle r="10" fill="#7cffc8">
        <animateMotion dur="22s" repeatCount="indefinite"
          path="M -170 120 A 170 70 0 1 1 170 120 A 170 70 0 1 1 -170 120"/>
      </circle>
      <text x="80" y="120" fill="white" font-size="10" font-family="monospace">
        AI Control Plane
      </text>
    </g>

  </g>

  <!-- ===================== -->
  <!-- CAPTUREFLOW SYSTEM    -->
  <!-- ===================== -->

  <g transform="translate(220 360)">
    <circle r="28" fill="url(#blueGlow)" filter="url(#blur)">
      <animate attributeName="r" values="26;30;26" dur="7s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="50" text-anchor="middle" fill="white" font-size="12" font-family="monospace">
      CAPTUREFLOW
    </text>

    <text x="0" y="65" text-anchor="middle" fill="#8fd3ff" font-size="10" font-family="monospace">
      cognition · memory · knowledge
    </text>
  </g>

  <!-- ===================== -->
  <!-- RSEA AGENT SYSTEM     -->
  <!-- ===================== -->

  <g transform="translate(780 360)">
    <circle r="28" fill="url(#purpleGlow)" filter="url(#blur)">
      <animate attributeName="r" values="26;30;26" dur="8s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="50" text-anchor="middle" fill="white" font-size="12" font-family="monospace">
      RSEA AGENT
    </text>

    <text x="0" y="65" text-anchor="middle" fill="#d7a8ff" font-size="10" font-family="monospace">
      research · search · analysis
    </text>
  </g>

  <!-- ===================== -->
  <!-- LA BUILDS CORE LABEL  -->
  <!-- ===================== -->

  <g transform="translate(520 380)">
    <circle r="20" fill="url(#coreGlow)" filter="url(#blur)">
      <animate attributeName="r" values="18;22;18" dur="5s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="45" text-anchor="middle" fill="white" font-size="13" font-family="monospace">
      LA BUILDS CORE
    </text>
  </g>

</svg>
