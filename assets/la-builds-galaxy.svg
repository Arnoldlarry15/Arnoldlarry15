<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <!-- Glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#8a6cff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#2b1b4d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <filter id="strongBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Rotation animations -->
    <style>
      <![CDATA[
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes reverseSpin {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.15); opacity: 1; }
      }

      @keyframes drift {
        0% { transform: translateX(0px); }
        50% { transform: translateX(10px); }
        100% { transform: translateX(0px); }
      }

      .slow-spin {
        transform-origin: center;
        animation: spin 120s linear infinite;
      }

      .medium-spin {
        transform-origin: center;
        animation: spin 60s linear infinite;
      }

      .fast-spin {
        transform-origin: center;
        animation: spin 25s linear infinite;
      }

      .reverse-spin {
        transform-origin: center;
        animation: reverseSpin 90s linear infinite;
      }

      .pulse {
        animation: pulse 3s ease-in-out infinite;
        transform-origin: center;
      }

      .drift {
        animation: drift 8s ease-in-out infinite;
      }

      text {
        font-family: Arial, sans-serif;
        fill: white;
        font-size: 14px;
        letter-spacing: 1px;
      }

      .label {
        font-size: 12px;
        opacity: 0.8;
      }
      ]]>
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#05060a"/>

  <!-- Distant star field -->
  <g class="slow-spin" opacity="0.6">
    <circle cx="200" cy="150" r="1.5" fill="white"/>
    <circle cx="400" cy="300" r="1" fill="white"/>
    <circle cx="1200" cy="200" r="1.2" fill="white"/>
    <circle cx="900" cy="700" r="1.3" fill="white"/>
    <circle cx="300" cy="800" r="1" fill="white"/>
    <circle cx="1400" cy="600" r="1.4" fill="white"/>
  </g>

  <!-- Central black hole -->
  <g class="pulse">
    <circle cx="800" cy="450" r="90" fill="url(#coreGlow)"/>
    <circle cx="800" cy="450" r="40" fill="#000000"/>
    <text x="800" y="455" text-anchor="middle" font-size="22" font-weight="bold">LA BUILDS</text>
  </g>

  <!-- Accretion disk -->
  <g class="fast-spin" filter="url(#blur)">
    <ellipse cx="800" cy="450" rx="260" ry="120" fill="none" stroke="#7a5cff" stroke-opacity="0.3"/>
    <ellipse cx="800" cy="450" rx="320" ry="160" fill="none" stroke="#ffb86b" stroke-opacity="0.15"/>
    <ellipse cx="800" cy="450" rx="380" ry="200" fill="none" stroke="#4fd1c5" stroke-opacity="0.1"/>
  </g>

  <!-- Sentinel Protocol system -->
  <g class="medium-spin">
    <circle cx="800" cy="170" r="28" fill="#2f6fff"/>
    <text x="800" y="175" text-anchor="middle">SENTINEL</text>

    <!-- 3 orbiting planets -->
    <g class="fast-spin">
      <circle cx="800" cy="120" r="10" fill="#ff4d4d"/>
      <circle cx="850" cy="170" r="8" fill="#ffd24d"/>
      <circle cx="780" cy="220" r="9" fill="#4dff88"/>
    </g>
  </g>

  <!-- Other orbiting systems -->
  <g class="slow-spin">

    <circle cx="1100" cy="250" r="20" fill="#b46bff"/>
    <text x="1100" y="250" text-anchor="middle" class="label">CAPTUREFLOW</text>

    <circle cx="1200" cy="500" r="18" fill="#7CFF6B"/>
    <text x="1200" y="500" text-anchor="middle" class="label">RSEA AGENT</text>

    <circle cx="1050" cy="650" r="18" fill="#ffb84d"/>
    <text x="1050" y="650" text-anchor="middle" class="label">FUTURE</text>

  </g>

  <g class="medium-spin">

    <circle cx="550" cy="650" r="18" fill="#4da3ff"/>
    <text x="550" y="650" text-anchor="middle" class="label">RESEARCH</text>

    <circle cx="400" cy="300" r="18" fill="#ff6b6b"/>
    <text x="400" y="300" text-anchor="middle" class="label">RED SET</text>

    <circle cx="650" cy="200" r="18" fill="#ffd36b"/>
    <text x="650" y="200" text-anchor="middle" class="label">ARES</text>

    <circle cx="300" cy="700" r="18" fill="#ff7ad9"/>
    <text x="300" y="700" text-anchor="middle" class="label">MARYVILLE CS AI</text>

  </g>

</svg>
